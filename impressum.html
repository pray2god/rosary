<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impressum</title>

<link rel="icon" href="template.ico" sizes="any">

  <style>
    :root {
      --bg-1: #080808;
      --bg-2: #17110d;
      --wood-3: #734a2d;
      --gold-soft: #c7a97a;
      --text-main: #f5efe8;
      --text-soft: #cab7a3;
      --shadow-deep: 0 24px 80px rgba(0, 0, 0, 0.5);
      --radius-xl: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top, rgba(139, 96, 59, 0.18), transparent 35%),
        linear-gradient(180deg, #050505 0%, #120d0a 28%, #1a120d 60%, #0c0907 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      border-radius: var(--radius-xl);
      padding: 28px 24px;
      background:
        linear-gradient(135deg, rgba(13, 13, 13, 0.95), rgba(35, 23, 16, 0.96)),
        linear-gradient(180deg, #2b1a10, var(--wood-3));
      box-shadow: var(--shadow-deep);
      border: 1px solid rgba(199, 169, 122, 0.14);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 2rem;
      color: var(--gold-soft);
    }

    p {
      margin: 0 0 12px;
      line-height: 1.7;
      color: var(--text-soft);
      font-size: 1rem;
    }

    a {
      color: var(--gold-soft);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .back-link {
      display: inline-block;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Impressum</h1>
    <p>This website is made and maintained by Thomas & Andreas Allesch.</p>
    <a class="back-link" href="./index.html">← Back to Rosary</a>
  </main>
</body>
</html>
